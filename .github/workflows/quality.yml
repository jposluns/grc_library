name: Repository quality checks

on:
  push:
    branches:
      - main
  pull_request:

# Least-privilege token: the lint job only reads the repository (checkout +
# run markdown/Python linters); it never writes contents, comments, or artefacts.
permissions:
  contents: read

jobs:
  lint:
    name: Lint markdown corpus
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"

      - name: Metadata audit
        run: python3 tools/lint-metadata.py

      - name: Language and style audit
        run: python3 tools/lint-language.py

      - name: Repository-internal link audit
        run: python3 tools/lint-links.py

      - name: Structural index integrity audit
        run: python3 tools/lint-structure.py

      - name: Framework citation hallucination audit
        run: python3 tools/lint-citations.py

      - name: Standards-currency audit
        run: python3 tools/lint-standards-currency.py

      - name: Filename and Document Title alignment audit
        run: python3 tools/lint-filename-title-alignment.py

      - name: Owner and Approving Authority role audit
        run: python3 tools/lint-roles.py

      - name: Mandatory requirement near uncertainty marker audit
        run: python3 tools/lint-shall-near-uncertainty.py

      - name: Per-document review cadence audit
        run: python3 tools/check-review-cadence.py

      - name: CHANGELOG file-reference link coverage
        run: python3 tools/lint-changelog-link-coverage.py

      - name: Placeholder leakage audit
        run: python3 tools/lint-placeholder-leakage.py

      - name: Library and document version monotonicity audit
        run: python3 tools/lint-library-version-monotonicity.py

      - name: Metadata date format audit
        run: python3 tools/lint-date-format.py

      - name: License consistency audit
        run: python3 tools/lint-license-consistency.py

      - name: Stub document audit
        run: python3 tools/lint-stub-documents.py

      - name: Section anchor reference audit
        run: python3 tools/lint-section-anchors.py

      - name: Intra-document section reference audit
        run: python3 tools/lint-intra-doc-refs.py

      - name: Required sections audit
        run: python3 tools/lint-required-sections.py

      - name: Acronym expansion consistency audit
        run: python3 tools/lint-acronym-consistency.py

      - name: Secret pattern audit
        run: python3 tools/lint-secrets-in-content.py

      - name: PII pattern audit
        run: python3 tools/lint-pii-in-content.py

      - name: Internal references audit
        run: python3 tools/lint-internal-references.py

      - name: External link domain audit
        run: python3 tools/lint-external-link-domains.py

      - name: Cross-document numerical coherence audit
        run: python3 tools/lint-cross-doc-numbers.py

      - name: Orphan document audit
        run: python3 tools/lint-orphan-documents.py

      - name: Citation verification freshness audit
        run: python3 tools/lint-citation-verification-freshness.py

      - name: Tooling provenance freshness audit
        run: python3 tools/lint-tooling-provenance-freshness.py

      - name: Version-date consistency audit
        run: python3 tools/lint-version-date-consistency.py

      - name: Metadata-block line-break audit
        run: python3 tools/lint-metadata-line-breaks.py

      - name: Document Date staleness audit
        run: python3 tools/lint-document-date-staleness.py

      - name: Skill derives-from reference audit
        run: python3 tools/lint-skill-derives-from.py

      - name: Machine-readable taxonomy in sync
        run: python3 tools/build-taxonomy.py --check

      - name: Adopter portal and maturity scorecard in sync
        run: python3 tools/build-portal.py --check

      - name: Gate-name parity audit
        run: python3 tools/lint-audit-gate-parity.py

      - name: Linter regression test suite
        run: python3 tools/run-linter-regression.py

      - name: Claude-rules local-copy sync audit
        run: python3 tools/lint-claude-rules-sync.py

      - name: Section placement audit
        run: python3 tools/lint-section-placement.py

      - name: Cross-file gate-count consistency audit
        run: python3 tools/lint-gate-count-consistency.py

      - name: Corpus version-bump-recency audit
        run: python3 tools/lint-version-bump-recency.py

      - name: Collection-enumeration consistency audit
        run: python3 tools/lint-collection-enumeration-consistency.py

      - name: External-overlay license consistency audit
        run: python3 tools/lint-external-overlay-license.py

      - name: Follow-up ageing audit
        run: python3 tools/lint-followup-ageing.py

      - name: Paired-skill step-parity audit
        run: python3 tools/lint-paired-skill-step-parity.py

      - name: TODO staleness audit
        run: python3 tools/lint-todo-staleness.py

      - name: Overnight-work file audit
        run: python3 tools/lint-overnight-file.py

      - name: Listing-surface completeness audit
        run: python3 tools/lint-listing-surface-completeness.py

      - name: CSA CCM/AICM citation-accuracy audit
        run: python3 tools/lint-ccm-aicm-citations.py

      - name: Matrix control-code validity audit
        run: python3 tools/lint-matrix-control-codes.py

      - name: Bookkeeping-parity audit
        run: python3 tools/lint-bookkeeping-parity.py

      - name: Working-tree prose-hygiene audit
        run: python3 tools/lint-working-prose-hygiene.py

      - name: Directory-scan-scope parity audit
        run: python3 tools/lint-scan-scope-parity.py

      - name: Corpus-to-project directional-dependency audit
        run: python3 tools/lint-directional-dependency.py

      - name: Per-document NIST CSF 2.0 control-code validity audit
        run: python3 tools/lint-document-control-codes.py

      - name: Cross-document retention-consistency audit
        run: python3 tools/lint-retention-consistency.py

      - name: Bare-normative-shall audit
        run: python3 tools/lint-bare-normative-shall.py

      - name: Backlog marked-done audit
        run: python3 tools/lint-todo-marked-done.py

      - name: Per-document ISO Annex A validity audit
        run: python3 tools/lint-document-iso-annex-a.py

      - name: CHANGELOG mirror header-parity audit
        run: python3 tools/lint-changelog-mirror-header-parity.py

      - name: Guardrail-review cadence audit
        run: python3 tools/lint-guardrail-cadence.py

      - name: COBIT/ISO 31000 citation-existence audit
        run: python3 tools/lint-cobit-iso31000-citations.py

      - name: Cross-file section-reference audit
        run: python3 tools/lint-cross-file-section-refs.py

      - name: Session-state lease audit
        run: python3 tools/lint-session-state.py

      - name: Audit-spec detailed-prose presence audit
        run: python3 tools/lint-audit-spec-detailed-prose.py

      - name: Cross-file section-name audit
        run: python3 tools/lint-cross-file-section-names.py

      - name: Unbalanced-fence audit
        run: python3 tools/lint-unbalanced-fences.py

      - name: Document-Type enumeration parity audit
        run: python3 tools/lint-doctype-parity.py

      - name: Nested-markdown-link audit
        run: python3 tools/lint-nested-markdown-links.py

      - name: Positional backlog-token audit
        run: python3 tools/lint-positional-backlog-tokens.py

      - name: Sibling-repo stub-guard audit
        run: python3 tools/lint-sibling-placeholders.py

      - name: Stdlib-only import audit
        run: python3 tools/lint-stdlib-only-imports.py

      - name: Citation-currency-cadence audit
        run: python3 tools/lint-citation-currency-cadence.py

      - name: COBIT objective title-text audit
        run: python3 tools/lint-cobit-title-text.py

      - name: CHANGELOG-on-PR check
        if: github.event_name == 'pull_request'
        run: python3 tools/check-changelog-on-pr.py

      - name: Per-PR version-bump check
        if: github.event_name == 'pull_request'
        run: python3 tools/check-version-bump-on-pr.py

      - name: CHANGELOG dash-on-PR check
        if: github.event_name == 'pull_request'
        run: python3 tools/check-changelog-dash-on-pr.py

      - name: Per-PR Version-Date co-bump check
        if: github.event_name == 'pull_request'
        run: python3 tools/check-date-cobump-on-pr.py

      - name: Backlog-rotation-on-PR check
        if: github.event_name == 'pull_request'
        run: python3 tools/check-todo-rotation-on-pr.py

      - name: Pack-README version-history co-bump check
        if: github.event_name == 'pull_request'
        run: python3 tools/check-pack-readme-cobump-on-pr.py

      - name: Handoff-snapshot freshness check
        if: github.event_name == 'pull_request'
        run: python3 tools/check-handoff-snapshot-on-pr.py

      - name: CHANGELOG length-on-PR check
        if: github.event_name == 'pull_request'
        run: python3 tools/check-changelog-length-on-pr.py

      - name: Detect collection candidates on pack PRs (informational)
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if git diff --name-only "$BASE_SHA" "$HEAD_SHA" | grep -q '^dev-security/claude-rules/'; then
            echo "Pack changes detected. Running collection-candidate detector..."
            python3 tools/detect-collection-candidates.py
          else
            echo "No pack changes in this PR. Skipping detector."
            echo "(Run on demand: python3 tools/detect-collection-candidates.py)"
          fi
