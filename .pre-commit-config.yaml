# Pre-commit configuration for the GRC Documentation Library.
#
# Install: pip install pre-commit && pre-commit install
# Run on all files: pre-commit run --all-files
#
# Each hook invokes a stdlib-only Python script with no third-party deps.

repos:
  - repo: local
    hooks:
      - id: lint-metadata
        name: Metadata audit
        entry: python3 tools/lint-metadata.py
        language: system
        pass_filenames: false
        types: [markdown]

      - id: lint-language
        name: Language and style audit
        entry: python3 tools/lint-language.py
        language: system
        pass_filenames: false
        types: [markdown]

      - id: lint-links
        name: Internal link audit
        entry: python3 tools/lint-links.py
        language: system
        pass_filenames: false
        types: [markdown]

      - id: lint-structure
        name: Structural index integrity
        entry: python3 tools/lint-structure.py
        language: system
        pass_filenames: false
        types: [markdown]

      - id: lint-citations
        name: Framework citation hallucination audit
        entry: python3 tools/lint-citations.py
        language: system
        pass_filenames: false
        types: [markdown]

      - id: lint-roles
        name: Owner and Approving Authority role audit
        entry: python3 tools/lint-roles.py
        language: system
        pass_filenames: false
        types: [markdown]

      - id: lint-shall-near-uncertainty
        name: Mandatory requirement near uncertainty marker audit
        entry: python3 tools/lint-shall-near-uncertainty.py
        language: system
        pass_filenames: false
        types: [markdown]

      - id: check-review-cadence
        name: Per-document review cadence audit
        entry: python3 tools/check-review-cadence.py
        language: system
        pass_filenames: false
        types: [markdown]

      - id: taxonomy-in-sync
        name: Machine-readable taxonomy in sync
        entry: python3 tools/build-taxonomy.py --check
        language: system
        pass_filenames: false
        types: [markdown]

      - id: portal-in-sync
        name: Adopter portal and maturity scorecard in sync
        entry: python3 tools/build-portal.py --check
        language: system
        pass_filenames: false
        types: [markdown]
