# Pre-commit configuration for the GRC Documentation Library.
#
# Install: pip install pre-commit && pre-commit install
# Run on all files: pre-commit run --all-files
#
# Each hook invokes a stdlib-only Python script (or the single audit
# runner) with no third-party dependencies. Hooks mirror the audit
# programme defined in:
#
#   - .github/workflows/quality.yml (CI source of truth)
#   - tools/run_all_audits.sh (local single-command equivalent)
#   - governance/specification-audit-programme.md (architecture spec)
#
# When a new audit is added to quality.yml, add the same hook here.

repos:
  - repo: local
    hooks:
      - id: lint-metadata
        name: Metadata audit
        entry: python3 tools/lint-metadata.py
        language: system
        pass_filenames: false
        types: [markdown]

      - id: lint-language
        name: Language and style audit
        entry: python3 tools/lint-language.py
        language: system
        pass_filenames: false
        types: [markdown]

